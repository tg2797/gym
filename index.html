<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { height:100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Noto Sans JP", sans-serif;
  background:#000000; color:#ffffff;
  height:100vh; height:100dvh;
  display:flex; flex-direction:column;
  overflow:hidden;
  overscroll-behavior-y:none;
  touch-action:manipulation;
  -webkit-font-smoothing:antialiased;
}
#bgfill { position:fixed; inset:-80px; background:#000000; z-index:-1; }
button { font-family:inherit; border:none; background:none; color:inherit; cursor:pointer; touch-action:manipulation; }
button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible { outline:2px solid #0a84ff; outline-offset:2px; }
input, select, textarea { font-family:inherit; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration:0.01ms !important; transition-duration:0.01ms !important; }
}

/* ===== layout ===== */
main { flex:1; min-height:0; width:100%; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior-y:contain;
  padding: calc(env(safe-area-inset-top) + 14px) 16px 110px; }
.view { display:none; max-width:560px; margin:0 auto; }
.view.on { display:block; animation:fadein .22s ease; }
@keyframes fadein { from { opacity:0; transform:translateY(4px);} to { opacity:1; transform:none;} }

.pagehead { display:flex; align-items:flex-end; justify-content:space-between; margin:6px 2px 16px; }
.pagetitle { font-size:30px; font-weight:800; letter-spacing:-0.5px; }
.pagesub { font-size:13px; color:#8e8e93; font-weight:600; }
.brand { font-size:13px; font-weight:800; letter-spacing:3px; color:#8e8e93; }

.sect { font-size:13px; font-weight:700; color:#8e8e93; letter-spacing:1px; margin:22px 4px 8px; text-transform:uppercase; }

/* ===== cards ===== */
.card { background:#1c1c1e; border-radius:22px; padding:16px; margin-bottom:12px; }
.card.pad-s { padding:14px; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.stat-label { font-size:12px; color:#8e8e93; font-weight:600; margin-bottom:4px; }
.stat-value { font-size:24px; font-weight:800; letter-spacing:-0.5px; font-variant-numeric:tabular-nums; }
.stat-value small { font-size:13px; font-weight:700; color:#8e8e93; margin-left:2px; }
.stat-sub { font-size:12px; color:#8e8e93; margin-top:3px; font-weight:600; }
.up { color:#30d158; } .down { color:#ff453a; } .gold { color:#ffd60a; }

.row { display:flex; align-items:center; gap:10px; }
.spread { justify-content:space-between; }
.muted { color:#8e8e93; }
.small { font-size:12px; }
hr.sep { border:none; border-top:0.5px solid rgba(84,84,88,0.55); margin:12px 0; }

/* ---------------- state ---------------- */
let state = null;

function defaultState(){
  const exercises = PRESET_EX.map((e,i)=>({ id:'p'+i, name:e[0], m:e[1] }));
  const byName = {};
  exercises.forEach(e=>{ byName[e.name] = e.id; });
  const templates = PRESET_TPL.map((t,i)=>({
    id:'t'+i, name:t[0], ex:t[1].map(n=>byName[n]).filter(Boolean)
  }));
  return {
    v:1,
    settings:{ height:null, barWeight:20, restSec:90, weeklyGoal:3 },
    exercises, templates,
    workouts:[], body:[], badges:{}, prCount:0,
    active:null
  };
}

function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){
      state = JSON.parse(raw);
      const d = defaultState();
      if(!state.settings) state.settings = d.settings;
      if(!state.exercises || !state.exercises.length) state.exercises = d.exercises;
      if(!state.templates) state.templates = d.templates;
      if(!state.workouts) state.workouts = [];
      if(!state.body) state.body = [];
      if(!state.badges) state.badges = {};
      if(typeof state.prCount !== 'number') state.prCount = 0;
      return;
    }
  }catch(e){ console.error(e); }
  state = defaultState();
  save();
}

function save(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
  catch(e){ showToast('保存に失敗しました（容量不足の可能性）'); }
}

/* ---------------- utils ---------------- */
const $  = (sel, root)=> (root||document).querySelector(sel);
const $$ = (sel, root)=> Array.from((root||document).querySelectorAll(sel));

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function pad2(n){ return String(n).padStart(2,'0'); }
function dstr(d){ return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
function todayStr(){ return dstr(new Date()); }
function parseD(s){ const p = s.split('-'); return new Date(+p[0], +p[1]-1, +p[2]); }
function fmtMD(s){ const d = parseD(s); return (d.getMonth()+1)+'/'+d.getDate(); }
function fmtJP(s){ const d = parseD(s); const w = ['日','月','火','水','木','金','土'][d.getDay()]; return (d.getMonth()+1)+'月'+d.getDate()+'日('+w+')'; }
function diffDays(a, b){ return Math.round((parseD(a) - parseD(b)) / 86400000); }
function addDays(s, n){ const d = parseD(s); d.setDate(d.getDate()+n); return dstr(d); }
function fmtNum(n){ return (Math.round(n*10)/10).toLocaleString('ja-JP'); }
function fmtInt(n){ return Math.round(n).toLocaleString('ja-JP'); }
function e1rm(w, r){ if(!w || !r) return 0; if(r===1) return w; return w * (1 + r/30); }
function vib(pat){ if(navigator.vibrate) try{ navigator.vibrate(pat); }catch(e){} }

function exById(id){ return state.exercises.find(e=>e.id===id) || null; }
function exName(id){ const e = exById(id); return e ? e.name : '削除された種目'; }
function exMuscle(id){ const e = exById(id); return e ? e.m : null; }

function weekStartStr(s){
  const d = parseD(s || todayStr());
  const day = (d.getDay()+6)%7; // Mon=0
  d.setDate(d.getDate()-day);
  return dstr(d);
}

/* sorted workouts (asc by date) */
function workoutsAsc(){ return state.workouts.slice().sort((a,b)=> a.date<b.date?-1 : a.date>b.date?1 : (a.start||0)-(b.start||0)); }
function workoutsDesc(){ return workoutsAsc().reverse(); }

/* previous sets of an exercise (before current session) */
function prevEntry(exId){
  const ws = workoutsDesc();
  for(const w of ws){
    for(const en of w.entries){
      if(en.ex === exId && en.sets.some(s=>s.w && s.r)) return { date:w.date, sets:en.sets.filter(s=>s.w && s.r) };
    }
  }
  return null;
}

/* historical bests for PR check */
function bestFor(exId){
  let bw = 0, b1 = 0;
  for(const w of state.workouts){
    for(const en of w.entries){
      if(en.ex !== exId) continue;
      for(const s of en.sets){
        if(!s.w || !s.r) continue;
        if(s.w > bw) bw = s.w;
        const e = e1rm(s.w, s.r);
        if(e > b1) b1 = e;
      }
    }
  }
  return { w:bw, e1:b1 };
}

function workoutVolume(w){
  let v = 0;
  for(const en of w.entries) for(const s of en.sets) if(s.w && s.r) v += s.w * s.r;
  return v;
}
function workoutSets(w){
  let n = 0;
  for(const en of w.entries) for(const s of en.sets) if(s.w && s.r) n++;
  return n;
}

function totalVolumeAll(){
  let v = 0; for(const w of state.workouts) v += workoutVolume(w); return v;
}

function streakDays(){
  const days = new Set(state.workouts.map(w=>w.date));
  if(state.active) days.add(todayStr());
  if(!days.size) return 0;
  let cur = todayStr();
  if(!days.has(cur)){
    cur = addDays(cur, -1);
    if(!days.has(cur)) return 0;
  }
  let n = 0;
  while(days.has(cur)){ n++; cur = addDays(cur, -1); }
  return n;
}

/* days since each muscle was trained: {muscle: days|null} */
function muscleLastMap(){
  const map = {};
  const t = todayStr();
  for(const w of workoutsDesc()){
    for(const en of w.entries){
      const m = exMuscle(en.ex);
      if(!m || map[m] !== undefined) continue;
      if(en.sets.some(s=>s.w && s.r)) map[m] = diffDays(t, w.date);
    }
  }
  return map;
}

/* ---------------- IndexedDB (photos) ---------------- */
let idb = null;
function idbOpen(){
  return new Promise((res, rej)=>{
    if(idb) return res(idb);
    const rq = indexedDB.open('lift_photos', 1);
    rq.onupgradeneeded = ()=>{ rq.result.createObjectStore('photos', { keyPath:'id' }); };
    rq.onsuccess = ()=>{ idb = rq.result; res(idb); };
    rq.onerror = ()=> rej(rq.error);
  });
}
function idbAll(){
  return idbOpen().then(db=> new Promise((res, rej)=>{
    const rq = db.transaction('photos').objectStore('photos').getAll();
    rq.onsuccess = ()=> res(rq.result || []);
    rq.onerror = ()=> rej(rq.error);
  })).catch(()=>[]);
}
function idbPut(rec){
  return idbOpen().then(db=> new Promise((res, rej)=>{
    const tx = db.transaction('photos','readwrite');
    tx.objectStore('photos').put(rec);
    tx.oncomplete = res; tx.onerror = ()=> rej(tx.error);
  }));
}
function idbDel(id){
  return idbOpen().then(db=> new Promise((res, rej)=>{
    const tx = db.transaction('photos','readwrite');
    tx.objectStore('photos').delete(id);
    tx.oncomplete = res; tx.onerror = ()=> rej(tx.error);
  }));
}

   ホーム
   ================================================================ */
function suggestToday(){
  const last = workoutsDesc()[0];
  const order = ['Push','Pull','Legs'];
  if(last && last.name){
    const i = order.indexOf(last.name);
    if(i >= 0){
      const next = order[(i+1)%3];
      const tpl = state.templates.find(t=>t.name===next);
      if(tpl) return tpl;
    }
    if(last.name==='Upper'){ const t = state.templates.find(t=>t.name==='Lower'); if(t) return t; }
    if(last.name==='Lower'){ const t = state.templates.find(t=>t.name==='Upper'); if(t) return t; }
  }
  // 最も長く鍛えていない筋肉を含むテンプレ
  const mlm = muscleLastMap();
  let best = null, bestScore = -1;
  for(const t of state.templates){
    let sc = 0;
    for(const id of t.ex){
      const m = exMuscle(id);
      const d = mlm[m];
      sc += (d === undefined) ? 14 : d;
    }
    sc = t.ex.length ? sc / t.ex.length : 0;
    if(sc > bestScore){ bestScore = sc; best = t; }
  }
  return best || state.templates[0] || null;
}

function nextWeightSuggestions(){
  const out = [];
  const seen = new Set();
  for(const w of workoutsDesc().slice(0,4)){
    for(const en of w.entries){
      if(seen.has(en.ex)) continue;
      seen.add(en.ex);
      const sets = en.sets.filter(s=>s.w && s.r);
      if(sets.length < 2) continue;
      const maxW = Math.max(...sets.map(s=>s.w));
      const minR = Math.min(...sets.map(s=>s.r));
      if(minR >= 10) out.push({ ex:en.ex, from:maxW, to:maxW+2.5, why:'全セット10回以上' });
      else if(minR <= 4) out.push({ ex:en.ex, from:maxW, to:Math.max(0,maxW-2.5), why:'回数が伸び悩み' });
    }
    if(out.length >= 3) break;
  }
  return out.slice(0,3);
}

function coachComments(){
  const msgs = [];
  const st = streakDays();
  const ws = workoutsAsc();
  const t = todayStr();
  // 週ボリューム比較
  const thisWk = weekStartStr(t);
  const lastWk = addDays(thisWk, -7);
  let vThis = 0, vLast = 0;
  for(const w of ws){
    if(w.date >= thisWk) vThis += w.vol || workoutVolume(w);
    else if(w.date >= lastWk) vLast += w.vol || workoutVolume(w);
  }
  if(st >= 6) msgs.push('🛌 ' + st + '日連続です。超回復のために休養日も検討しましょう。');
  else if(st >= 3) msgs.push('🔥 ' + st + '日連続トレーニング中。いい流れです！');
  if(vLast > 0 && vThis > vLast) msgs.push('📈 今週のボリュームは先週比 +' + fmtInt((vThis/vLast-1)*100) + '%。順調に伸びています。');
  const mlm = muscleLastMap();
  let staleKey = null, staleDays = 0;
  for(const k of Object.keys(MUSCLES)){
    const d = mlm[k];
    if(d !== undefined && d >= 7 && d > staleDays){ staleDays = d; staleKey = k; }
  }
  if(staleKey) msgs.push('💡 ' + MUSCLES[staleKey] + 'は' + staleDays + '日間トレーニングしていません。次のメニューに入れてみては？');
  // 直近PR
  const recentPR = workoutsDesc().slice(0,3).some(w=> (w.prs||[]).length);
  if(recentPR) msgs.push('🏆 最近PRを更新しています。この調子！');
  if(!ws.length) msgs.push('👋 ようこそ。まずは「記録」タブからワークアウトを始めましょう。');
  if(!msgs.length) msgs.push('💪 コツコツ続けることが最大の近道です。');
  return msgs.slice(0,2);
}

function ringSVG(pct, color, r, sw, cx){
  const c = 2 * Math.PI * r;
  const off = c * (1 - Math.min(1, Math.max(0, pct)));
  return '<circle cx="'+cx+'" cy="'+cx+'" r="'+r+'" fill="none" stroke="#2c2c2e" stroke-width="'+sw+'"/>' +
    '<circle cx="'+cx+'" cy="'+cx+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" transform="rotate(-90 '+cx+' '+cx+')"/>';
}

function newEntry(exId){

  return { ex:exId, sets, memo:'' };
}

function getSet(ei, si){
  const en = state.active && state.active.entries[ei];
  return en ? en.sets[si] : null;
}

function updateLive(){
  const lt = liveTotals();
  const v = $('#lvVol'), s = $('#lvSets');
  if(v) v.textContent = fmtInt(lt.vol);
  if(s) s.textContent = lt.sets;
}

function stepSet(ei, si, key, delta){
  const s = getSet(ei, si); if(!s) return;
  const en = state.active.entries[ei];
  if(s[key] == null){
    // 空なら前セット→前回→初期値から引き継ぐ
    let base = null;
    if(si > 0 && en.sets[si-1][key] != null) base = en.sets[si-1][key];
    else {
      const prev = prevEntry(en.ex);
      if(prev && prev.sets[si]) base = prev.sets[si][key];
      else if(prev && prev.sets[0]) base = prev.sets[0][key];
    }
    s[key] = base != null ? base : (key==='w' ? state.settings.barWeight : (delta>0?1:0));
  } else {
    s[key] = Math.max(0, Math.round((s[key] + delta)*100)/100);
  }
  if(key==='r') s[key] = Math.round(s[key]);
  const input = $('input[data-in="'+key+'"][data-ei="'+ei+'"][data-si="'+si+'"]');
  if(input) input.value = s[key];
  save(); updateLive(); vib(8);
}

const RPE_CYCLE = [null, 6, 7, 8, 9, 10];
function cycleRPE(ei, si, btn){
  const s = getSet(ei, si); if(!s) return;
  const i = RPE_CYCLE.indexOf(s.rpe);
  s.rpe = RPE_CYCLE[(i+1) % RPE_CYCLE.length];
  btn.textContent = 'RPE ' + (s.rpe==null ? '–' : s.rpe);
  save();
}

function doneSet(ei, si){
  const s = getSet(ei, si); if(!s) return;
  const en = state.active.entries[ei];
  if(!s.done){
    if(!s.w || !s.r){
      // 未入力なら前回 or 前セットを自動採用
      const prev = prevEntry(en.ex);
      const ref = (si>0 && en.sets[si-1].w) ? en.sets[si-1] : (prev && (prev.sets[si]||prev.sets[0]));
      if(ref){ s.w = s.w || ref.w; s.r = s.r || ref.r; }
    }
    if(!s.w || !s.r){ showToast('重量と回数を入力してください'); return; }
    s.done = true;
    save();
    // PRチェック
    const best = bestFor(en.ex);
    if(s.w > best.w && best.w > 0) showToast('🏆 重量PR！ '+exName(en.ex)+' '+fmtNum(s.w)+'kg', true);
    else if(e1rm(s.w,s.r) > best.e1 && best.e1 > 0) showToast('🏆 推定1RM更新！ '+fmtNum(e1rm(s.w,s.r))+'kg', true);
    vib([12,40,12]);
    restStart(state.settings.restSec || 90);
  } else {
    s.done = false;
    save();
  }
  renderWorkout();
}

function copyPrevAll(ei){
  const en = state.active.entries[ei];
  const prev = prevEntry(en.ex);
  if(!prev){ showToast('前回の記録がありません'); return; }
  en.sets = prev.sets.map(s=>({ w:s.w, r:s.r, rpe:null, done:false }));

function copyPrevSet(ei, si){
  const en = state.active.entries[ei];

/* ---- finish ---- */
function finishWorkout(){
  const a = state.active;
  let filled = 0;
  for(const en of a.entries) for(const s of en.sets) if(s.w && s.r) filled++;
  if(!filled){ showToast('記録されたセットがありません'); return; }

  // PR判定（保存前の履歴と比較）
  const prs = [];
  const bestCache = {};
  for(const en of a.entries){
    if(!bestCache[en.ex]) bestCache[en.ex] = bestFor(en.ex);
    const b = bestCache[en.ex];
    let mw = 0, m1 = 0;
    for(const s of en.sets){ if(s.w && s.r){ mw = Math.max(mw, s.w); m1 = Math.max(m1, e1rm(s.w, s.r)); } }
    if(mw > b.w && b.w > 0) prs.push(exName(en.ex)+' 重量 '+fmtNum(mw)+'kg');
    else if(m1 > b.e1 && b.e1 > 0) prs.push(exName(en.ex)+' 推定1RM '+fmtNum(m1)+'kg');
  }
  state.prCount = (state.prCount||0) + prs.length;

  const rec = {
    id: uid(),
    date: todayStr(),
    name: a.name,
    start: a.start,
    end: Date.now(),
    entries: a.entries.map(en=>({ ex:en.ex, memo:en.memo||'', sets:en.sets.filter(s=>s.w && s.r).map(s=>({ w:s.w, r:s.r, rpe:s.rpe, done:true })) })).filter(en=>en.sets.length),
    prs
  };
  rec.vol = workoutVolume(rec);
  rec.setsN = workoutSets(rec);
  state.workouts.push(rec);
  state.active = null;
  const newBadges = awardBadges();
  save();
  restStop();
  renderWorkout(); renderHome();

  const durMin = Math.round((rec.end - rec.start)/60000);
  openSheet(`
  <div style="text-align:center;padding:8px 0 4px;">
    <div style="font-size:44px;">🎉</div>
    <div class="sheettitle" style="margin:8px 0 2px;">ワークアウト完了！</div>
    <div class="small muted">${esc(fmtJP(rec.date))} ・ ${durMin}分</div>
  </div>
  <div class="grid2" style="margin:14px 0;">
    <div class="card pad-s" style="margin:0;"><div class="stat-label">ボリューム</div><div class="stat-value">${fmtInt(rec.vol)}<small>kg</small></div></div>
    <div class="card pad-s" style="margin:0;"><div class="stat-label">セット数</div><div class="stat-value">${rec.setsN}</div></div>
  </div>
  ${prs.length ? '<div class="card pad-s" style="border:1px solid rgba(255,214,10,0.4);">'+prs.map(p=>'<div style="font-size:14px;font-weight:700;padding:3px 0;">🏆 '+esc(p)+'</div>').join('')+'</div>' : ''}
  ${newBadges.length ? '<div class="card pad-s">'+newBadges.map(b=>'<div style="font-size:14px;font-weight:700;padding:3px 0;">'+b.icon+' バッジ獲得：'+esc(b.name)+'</div>').join('')+'</div>' : ''}
  <button class="btn" data-act="sheet-close">閉じる</button>`);
  vib([15,60,15,60,30]);
}

function awardBadges(){
  const earned = [];
  const n = state.workouts.length;
  const tv = totalVolumeAll();
  const st = streakDays();
  const hit = (name, kg)=>{
    for(const w of state.workouts) for(const en of w.entries){
      if(exName(en.ex) !== name) continue;
      for(const s of en.sets) if(s.w >= kg) return true;
    }
    return false;
  };
  const cond = {
    first: n>=1, w10: n>=10, w50: n>=50, w100: n>=100,
    vol100k: tv>=100000, vol1m: tv>=1000000,
    streak7: st>=7, streak30: st>=30,
    bench60: hit('ベンチプレス',60), bench100: hit('ベンチプレス',100),
    squat100: hit('スクワット',100), dead150: hit('デッドリフト',150),
    pr10: (state.prCount||0)>=10
  };
  for(const b of BADGES){
    if(cond[b.id] && !state.badges[b.id]){
      state.badges[b.id] = todayStr();
      earned.push(b);
    }
  }
  return earned;
}

let restEnd = 0, restTotal = 0, restTick = null, restHideTimer = null;
function restStart(sec){
  restTotal = sec;
  restEnd = Date.now() + sec*1000;
  $('#restPill').classList.add('on');
  clearTimeout(restHideTimer);
  clearInterval(restTick);
  restTick = setInterval(restUpdate, 250);
  restUpdate();
}
function restUpdate(){
  const left = Math.max(0, restEnd - Date.now());
  const s = Math.ceil(left/1000);
  $('#rpTime').textContent = Math.floor(s/60)+':'+pad2(s%60);
  $('#rpFill').style.width = restTotal ? (left/(restTotal*1000)*100)+'%' : '0%';
  if(left <= 0){
    clearInterval(restTick);
    vib([300,120,300]);
    beep();
    $('#rpTime').textContent = '終了！';
    clearTimeout(restHideTimer);
    restHideTimer = setTimeout(restStop, 2500);
  }
}
function restStop(){
  clearInterval(restTick);
  clearTimeout(restHideTimer);
  $('#restPill').classList.remove('on');
}
function beep(){
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    const ctx = new AC();
    const now = ctx.currentTime;
    [0, 0.25, 0.5].forEach(t=>{
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.frequency.value = 880; o.type = 'sine';
      g.gain.setValueAtTime(0.001, now+t);
      g.gain.exponentialRampToValueAtTime(0.25, now+t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001, now+t+0.18);
      o.connect(g); g.connect(ctx.destination);
      o.start(now+t); o.stop(now+t+0.2);
    });
    setTimeout(()=>ctx.close(), 1200);
  }catch(e){}
}

/* ---- plate calculator ---- */
const PLATES = [
  [25, '#ff453a', 66], [20, '#0a84ff', 62], [15, '#ffd60a', 54],
  [10, '#30d158', 46], [5, '#f2f2f7', 38], [2.5, '#8e8e93', 30], [1.25, '#636366', 24]
];
function openPlateSheet(initW){
  openSheet(`
  <div class="sheettitle">プレート計算</div>
  <div class="inrow" style="margin-bottom:12px;">
    <div class="field" style="margin:0;"><label>合計重量 kg</label>
      <input class="tin" id="plW" inputmode="decimal" value="${initW||''}" placeholder="例：100"></div>
    <div class="field" style="margin:0;max-width:40%;"><label>バー kg</label>
      <select class="tin" id="plBar">
        ${[20,15,10,7].map(b=>'<option value="'+b+'"'+(b===(state.settings.barWeight||20)?' selected':'')+'>'+b+'kg</option>').join('')}
      </select></div>
  </div>
  <div class="card pad-s" style="margin:0;">
    <div class="platevis" id="plVis"></div>
    <div class="platelist" id="plList"></div>
  </div>`);
  renderPlates();
}
function renderPlates(){
  const w = parseFloat($('#plW').value);
  const bar = parseFloat($('#plBar').value);
  const vis = $('#plVis'), list = $('#plList');
  if(!vis) return;
  if(!w || w <= bar){
    vis.innerHTML = '<div class="muted small">重量を入力してください</div>';
    list.innerHTML = '';
    return;
  }
  let side = (w - bar) / 2;
  const used = [];
  for(const [p] of PLATES){
    while(side >= p - 0.001){ used.push(p); side -= p; }
  }
  const rem = Math.round(side*100)/100;
  const plateDiv = p=>{
    const def = PLATES.find(x=>x[0]===p);
    return '<div class="plate" style="background:'+def[1]+';width:'+Math.max(12, def[2]/4.4)+'px;height:'+def[2]+'px;">'+ (p>=5?p:'') +'</div>';
  };
  const left = used.slice().reverse().map(plateDiv).join('');
  const right = used.map(plateDiv).join('');
  vis.innerHTML = '<div class="platebar sleeve"></div>'+left+'<div class="platebar"></div>'+right+'<div class="platebar sleeve"></div>';
  const cnt = {};
  used.forEach(p=>cnt[p]=(cnt[p]||0)+1);
  const txt = Object.keys(cnt).sort((a,b)=>b-a).map(p=>p+'kg × '+cnt[p]+'枚').join('　');
  list.innerHTML = (used.length ? '片側： '+txt : 'バーのみ') +
    (rem > 0 ? ' <small>（残り '+fmtNum(rem)+'kg/側 は端数）</small>' : '') +
    '<div class="small muted" style="margin-top:4px;">バー'+bar+'kg ＋ 両側で '+fmtNum((w-bar-rem*2))+'kg</div>';
}

function bodyLatest(key){
  const arr = state.body.slice().sort((a,b)=> a.d<b.d?-1:1);
  for(let i=arr.length-1;i>=0;i--){
    if(key==='w' || key==='f'){ if(arr[i][key] != null) return arr[i]; }
    else if(arr[i].mes && arr[i].mes[key] != null) return arr[i];
  }
  return null;
}

function bodyVal(rec, key){ return (key==='w'||key==='f') ? rec[key] : rec.mes[key]; }

/* latest & previous records containing key: {cur, prev} */
function bodyPrevPair(key){
  const arr = state.body.slice().sort((a,b)=> a.d<b.d?-1:1);
  let cur = null, prev = null;
  for(let i=arr.length-1;i>=0;i--){
    const v = (key==='w'||key==='f') ? arr[i][key] : (arr[i].mes ? arr[i].mes[key] : null);
    if(v == null) continue;
    if(!cur) cur = arr[i];
    else { prev = arr[i]; break; }
  }
  return { cur, prev };
}

/* 前回比バッジ。goalDir: +1=増が良い, -1=減が良い */
function bodyDiffHTML(key, goalDir){
  const p = bodyPrevPair(key);
  if(!p.cur || !p.prev) return '';
  const d = Math.round((bodyVal(p.cur, key) - bodyVal(p.prev, key))*10)/10;
  const cls = d === 0 ? 'muted' : (d * goalDir > 0 ? 'up' : 'down');
  return '<span class="'+cls+'">'+(d>0?'+':'')+fmtNum(d)+'</span>';
}

function loadPhotos(){
  photoURLs.forEach(u=>URL.revokeObjectURL(u));
  photoURLs = [];
  idbAll().then(list=>{
    const grid = $('#photoGrid');
    if(!grid) return;
    const items = list.filter(p=>p.pose===photoPose).sort((a,b)=> a.d<b.d?1:-1);
    if(!items.length){
      grid.innerHTML = '<div class="muted small" style="grid-column:1/-1;text-align:center;padding:10px;">まだ写真がありません</div>';
      return;
    }
    grid.innerHTML = items.map(p=>{
      const u = URL.createObjectURL(p.blob);
      photoURLs.push(u);
      return '<div class="photocell"><img src="'+u+'" alt=""><div class="pd">'+esc(fmtMD(p.d))+'</div><button class="px" data-act="photo-del" data-id="'+p.id+'">✕</button></div>';
    }).join('');
  });
}

function addPhoto(file){
  const rd = new FileReader();
  rd.onload = ()=>{
    const img = new Image();
    img.onload = ()=>{
      const max = 1000;
      let w = img.width, h = img.height;
      if(Math.max(w,h) > max){ const k = max/Math.max(w,h); w = Math.round(w*k); h = Math.round(h*k); }
      const cv = document.createElement('canvas');
      cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      cv.toBlob(blob=>{
        if(!blob){ showToast('画像の処理に失敗しました'); return; }
        idbPut({ id:uid(), d:todayStr(), pose:photoPose, blob })
          .then(()=>{ showToast('写真を保存しました'); loadPhotos(); })
          .catch(()=> showToast('保存に失敗しました'));
      }, 'image/jpeg', 0.82);
    };
    img.onerror = ()=> showToast('画像を読み込めませんでした');
    img.src = rd.result;
  };
  rd.readAsDataURL(file);
}

let cmpURLs = [];
function openCompareSheet(){
  idbAll().then(list=>{
    if(list.length < 2){ showToast('比較には写真が2枚以上必要です'); return; }
    list.sort((a,b)=> a.d<b.d?-1:1);
    const pref = list.filter(p=>p.pose===photoPose);
    const use = pref.length >= 2 ? pref : list;
    const A = use[0], B = use[use.length-1];
    const poseName = {front:'正面', side:'横', back:'後ろ'};
    const opt = sel => list.map(p=>'<option value="'+p.id+'"'+(p.id===sel?' selected':'')+'>'+fmtMD(p.d)+'（'+poseName[p.pose]+'）</option>').join('');
    openSheet(`
    <div class="sheettitle">写真比較</div>
    <div class="inrow" style="margin-bottom:12px;">
      <select class="tin" id="cmpA">${opt(A.id)}</select>
      <select class="tin" id="cmpB">${opt(B.id)}</select>
    </div>
    <div class="cmpwrap" id="cmpWrap">
      <img id="cmpImgA" alt="">
      <img id="cmpImgB" class="cmpB" alt="">
      <div class="cmpline" id="cmpLine"></div>
      <div class="cmptag" style="left:8px;" id="cmpTagA"></div>
      <div class="cmptag" style="right:8px;" id="cmpTagB"></div>
    </div>
    <input type="range" class="cmprange" id="cmpRange" min="0" max="100" value="50">`);
    window._cmpList = list;
    updateCompare();
  });
}
function updateCompare(){
  const list = window._cmpList || [];
  const a = list.find(p=>p.id===$('#cmpA').value);
  const b = list.find(p=>p.id===$('#cmpB').value);
  if(!a || !b) return;
  cmpURLs.forEach(u=>URL.revokeObjectURL(u));
  const ua = URL.createObjectURL(a.blob), ub = URL.createObjectURL(b.blob);
  cmpURLs = [ua, ub];
  $('#cmpImgA').src = ua; $('#cmpImgB').src = ub;
  $('#cmpTagA').textContent = fmtMD(a.d);
  $('#cmpTagB').textContent = fmtMD(b.d);
  applyCmpPos($('#cmpRange').value);
}
function applyCmpPos(v){
  const img = $('#cmpImgB'), line = $('#cmpLine');
  if(img) img.style.clipPath = 'inset(0 0 0 '+v+'%)';
  if(line) line.style.left = v+'%';
}

/* ---- chart pane ---- */
function chartSeries(){
  if(anaSrc === 'body'){
    const arr = state.body.slice().sort((a,b)=> a.d<b.d?-1:1);
    const pts = [];
    for(const b of arr){
      let val = null;
      if(anaBodyKey==='w') val = b.w;
      else if(anaBodyKey==='f') val = b.f;
      else val = b.mes ? b.mes[anaBodyKey] : null;
      if(val != null) pts.push({ d:b.d, v:val });
    }
    return pts;
  }
  if(!anaExId) return [];
  const pts = [];
  for(const w of workoutsAsc()){
    let mw = 0, vol = 0, m1 = 0, has = false;
    for(const en of w.entries){
      if(en.ex !== anaExId) continue;
      for(const s of en.sets){
        if(!s.w || !s.r) continue;
        has = true;
        mw = Math.max(mw, s.w); vol += s.w*s.r; m1 = Math.max(m1, e1rm(s.w,s.r));
      }
    }
    if(has) pts.push({ d:w.date, v: anaExMetric==='maxw'?mw : anaExMetric==='vol'?vol : Math.round(m1*10)/10 });
  }
  return pts;
}

function drawAnaChart(){
  let pts = chartSeries();
  if(anaPeriod > 0){
    const cut = addDays(todayStr(), -anaPeriod);
    pts = pts.filter(p=> p.d >= cut);
  }
  const cv = $('#anaCanvas'), stats = $('#anaStats');
  if(!cv) return;
  const unit = anaSrc==='body' ? (anaBodyKey==='f'?'%':(anaBodyKey==='w'?'kg':'cm')) : 'kg';
  drawLineChart(cv, pts, anaSrc==='body' && anaBodyKey==='f' ? '#ff9f0a' : '#30d158', unit);
  if(pts.length){
    const vals = pts.map(p=>p.v);
    const first = vals[0], last = vals[vals.length-1];
    const chg = last - first;
    stats.innerHTML =
      '<div><b>'+fmtNum(last)+'</b><span>最新</span></div>' +
      '<div><b>'+fmtNum(Math.max(...vals))+'</b><span>最大</span></div>' +
      '<div><b>'+fmtNum(Math.min(...vals))+'</b><span>最小</span></div>' +
      '<div><b class="'+(chg>=0?'up':'down')+'">'+(chg>0?'+':'')+fmtNum(chg)+'</b><span>変化</span></div>';
  } else stats.innerHTML = '';
}

function drawLineChart(cv, pts, color, unit){
  const dpr = window.devicePixelRatio || 1;
  const W = cv.clientWidth || 320, H = 230;
  cv.width = W*dpr; cv.height = H*dpr;
  const ctx = cv.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0,0,W,H);
  cv._map = null;

  if(pts.length < 1){
    ctx.fillStyle = '#8e8e93';
    ctx.font = '600 13px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('データがありません', W/2, H/2);
    return;
  }
  const padL = 8, padR = 12, padT = 18, padB = 26;
  const xs = pts.map(p=> parseD(p.d).getTime());
  const ys = pts.map(p=> p.v);
  let x0 = Math.min(...xs), x1 = Math.max(...xs);
  if(x0 === x1){ x0 -= 43200000; x1 += 43200000; }
  let y0 = Math.min(...ys), y1 = Math.max(...ys);
  const yr = (y1-y0) || Math.max(1, Math.abs(y1)*0.1);
  y0 -= yr*0.15; y1 += yr*0.15;

  const X = t => padL + (t-x0)/(x1-x0) * (W-padL-padR);
  const Y = v => padT + (1-(v-y0)/(y1-y0)) * (H-padT-padB);

  // grid
  ctx.strokeStyle = 'rgba(84,84,88,0.35)';
  ctx.lineWidth = 0.5;
  ctx.fillStyle = '#636366';
  ctx.font = '600 10px -apple-system, sans-serif';
  ctx.textAlign = 'left';
  for(let i=0;i<=3;i++){
    const v = y0 + (y1-y0)*i/3;
    const y = Y(v);
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W-padR, y); ctx.stroke();
    ctx.fillText(fmtNum(v), padL+2, y-4);
  }
  // x labels
  ctx.textAlign = 'center';
  ctx.fillText(fmtMD(pts[0].d), Math.max(padL+16, X(xs[0])), H-8);
  if(pts.length>1) ctx.fillText(fmtMD(pts[pts.length-1].d), Math.min(W-padR-16, X(xs[xs.length-1])), H-8);

  // area
  if(pts.length > 1){
    const grad = ctx.createLinearGradient(0, padT, 0, H-padB);
    grad.addColorStop(0, color+'44');
    grad.addColorStop(1, color+'00');
    ctx.beginPath();
    ctx.moveTo(X(xs[0]), Y(ys[0]));
    for(let i=1;i<pts.length;i++) ctx.lineTo(X(xs[i]), Y(ys[i]));
    ctx.lineTo(X(xs[xs.length-1]), H-padB);
    ctx.lineTo(X(xs[0]), H-padB);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
    // line
    ctx.beginPath();
    ctx.moveTo(X(xs[0]), Y(ys[0]));
    for(let i=1;i<pts.length;i++) ctx.lineTo(X(xs[i]), Y(ys[i]));
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.stroke();
  }
  // dots
  for(let i=0;i<pts.length;i++){
    ctx.beginPath();
    ctx.arc(X(xs[i]), Y(ys[i]), i===pts.length-1 ? 4.5 : 2.6, 0, Math.PI*2);
    ctx.fillStyle = i===pts.length-1 ? '#ffffff' : color;
    ctx.fill();
    if(i===pts.length-1){
      ctx.beginPath();
      ctx.arc(X(xs[i]), Y(ys[i]), 4.5, 0, Math.PI*2);
      ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.stroke();
    }
  }
  cv._map = { pts, X, Y, xs, unit };
}

function chartScrub(cv, clientX){
  const map = cv._map;
  const tip = $('#anaTip');
  if(!map || !tip) return;
  const rect = cv.getBoundingClientRect();
  const x = clientX - rect.left;
  let bi = 0, bd = Infinity;
  for(let i=0;i<map.pts.length;i++){
    const d = Math.abs(map.X(map.xs[i]) - x);
    if(d < bd){ bd = d; bi = i; }
  }
  const p = map.pts[bi];
  tip.style.display = 'block';
  tip.textContent = fmtMD(p.d)+'  '+fmtNum(p.v)+map.unit;
  const px = Math.min(Math.max(map.X(map.xs[bi]) - 40, 4), rect.width - 100);
  tip.style.left = px+'px';
}

/* ---- heatmap pane ---- */
function heatColor(d){
  if(d === undefined) return '#3a3a3c';
  if(d <= 1) return '#ff453a';
  if(d <= 6) return '#30d158';
  return '#ffd60a';
}
function heatStatus(d){
  if(d === undefined) return ['記録なし', '#8e8e93'];
  if(d === 0) return ['今日・回復中', '#ff453a'];
  if(d === 1) return ['昨日・回復中', '#ff453a'];
  if(d <= 6) return [d+'日前', '#30d158'];
  return [d+'日前・そろそろ', '#ffd60a'];
}

    '<rect x="28" y="40" width="12" height="58" rx="6" fill="#232326"/>' +

  let m = '';
  if(view === 'front'){
    m += C(35,42,7, c('shoulders')) + C(85,42,7, c('shoulders'));
    m += R(45,37,14,16,4, c('chest')) + R(61,37,14,16,4, c('chest'));
    m += R(29,50,10,20,5, c('biceps')) + R(81,50,10,20,5, c('biceps'));
    m += R(28,72,10,22,5, c('forearms')) + R(82,72,10,22,5, c('forearms'));
    m += R(48,55,24,32,6, c('abs'));
    m += R(44,92,13,36,6, c('quads')) + R(63,92,13,36,6, c('quads'));
    m += R(45,134,11,30,5, c('calves')) + R(64,134,11,30,5, c('calves'));
  } else {
    m += R(46,31,28,10,5, c('traps'));
    m += C(35,42,7, c('shoulders')) + C(85,42,7, c('shoulders'));
    m += R(44,43,15,26,5, c('back')) + R(61,43,15,26,5, c('back'));
    m += R(29,50,10,20,5, c('triceps')) + R(81,50,10,20,5, c('triceps'));
    m += R(28,72,10,22,5, c('forearms')) + R(82,72,10,22,5, c('forearms'));
    m += R(50,71,20,14,5, c('lowerback'));
    m += R(45,87,14,17,6, c('glutes')) + R(61,87,14,17,6, c('glutes'));
    m += R(44,106,13,28,6, c('hams')) + R(63,106,13,28,6, c('hams'));
    m += R(45,138,11,28,5, c('calves')) + R(64,138,11,28,5, c('calves'));
  }
  return '<svg viewBox="0 0 120 174" xmlns="http://www.w3.org/2000/svg">'+base+m+'</svg>';
}

function renderCalPane(el){
  const parts = calCursor.split('-');

  const startDow = first.getDay(); // Sun start
  const daysIn = new Date(y, mo, 0).getDate();
  const wDates = new Set(state.workouts.map(w=>w.date));
  const bDates = new Set(state.body.map(b=>b.d));
  const t = todayStr();

  let volMonth = 0, cnt = 0;
  const mp = calCursor + '-';
  const cntDays = new Set();
  for(const w of state.workouts){
    if(w.date.startsWith(mp)){ volMonth += w.vol!=null?w.vol:workoutVolume(w); cnt++; cntDays.add(w.date); }

  let cells = '';

function download(filename, text, mime){
  const blob = new Blob([text], { type:mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 600);
}

function exportJSON(){
  const data = Object.assign({}, state, { active:null });
  download('lift_backup_'+todayStr()+'.json', JSON.stringify(data, null, 1), 'application/json');
  showToast('バックアップを書き出しました');
}

function exportCSV(){
  const rows = [['日付','種目','セット','重量kg','回数','RPE','ボリューム','推定1RM']];
  for(const w of workoutsAsc()){
    for(const en of w.entries){
      en.sets.forEach((s,i)=>{
        if(!s.w || !s.r) return;
        rows.push([w.date, exName(en.ex), i+1, s.w, s.r, s.rpe==null?'':s.rpe, s.w*s.r, Math.round(e1rm(s.w,s.r)*10)/10]);
      });
    }
  }
  const csv = '\uFEFF' + rows.map(r=> r.map(c=>{
    const v = String(c);
    return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v;
  }).join(',')).join('\n');
  download('lift_records_'+todayStr()+'.csv', csv, 'text/csv');
  showToast('CSVを書き出しました');
}

function importJSON(file){
  const rd = new FileReader();
  rd.onload = ()=>{
    try{
      const data = JSON.parse(rd.result);
      if(!data || !Array.isArray(data.workouts)) throw new Error('bad');
      data.active = null;
      state = data;
      load2ndPass();
      save();
      switchTab('home');
      showToast('バックアップを読み込みました');
    }catch(e){
      showToast('読み込みに失敗しました（形式が不正です）');
    }
  };
  rd.readAsText(file);
}
function load2ndPass(){

  if(!state.templates) state.templates = d.templates;

}

/* ================================================================
   イベント委譲
   ================================================================ */
function onClick(e){
  const t = e.target.closest('[data-act]');
  if(!t) return;
  const act = t.dataset.act;

  // 二段階確認
  if(t.dataset.confirm){
    if(!t.dataset.armed){
      t.dataset.armed = '1';
      showToast('もう一度タップで実行します');
      setTimeout(()=>{ try{ delete t.dataset.armed; }catch(err){} }, 2600);
      return;
    }
    delete t.dataset.armed;
  }

  const ei = t.dataset.ei != null ? +t.dataset.ei : null;
  const si = t.dataset.si != null ? +t.dataset.si : null;

  switch(act){
    case 'tab': switchTab(t.dataset.tab); break;
    case 'sheet-close': closeSheet(); break;

    /* ---- workout start ---- */
    case 'start-template': {
      const tpl = state.templates.find(x=>x.id===t.dataset.id);
      if(tpl){ closeSheet(); startWorkout(tpl); }
      break;
    }
    case 'start-empty': startWorkout(null); break;

    /* ---- template editor ---- */
    case 'open-template': openTemplateEditor(t.dataset.id); break;
    case 'new-template': openTemplateEditor(null); break;
    case 'tpl-up': {
      const i = +t.dataset.i;
      if(i > 0){ const a = editorDraft.ex; [a[i-1], a[i]] = [a[i], a[i-1]]; renderTemplateEditor(); }
      break;
    }
    case 'tpl-down': {
      const i = +t.dataset.i;
      const a = editorDraft.ex;
      if(i < a.length-1){ [a[i+1], a[i]] = [a[i], a[i+1]]; renderTemplateEditor(); }
      break;
    }
    case 'tpl-remove': {
      editorDraft.ex.splice(+t.dataset.i, 1);
      renderTemplateEditor();
      break;
    }
    case 'tpl-add-ex': openExPicker('template'); break;
    case 'tpl-save': {
      const name = ($('#tplName') ? $('#tplName').value.trim() : editorDraft.name) || '無題';
      if(!editorDraft.ex.length){ showToast('種目を追加してください'); break; }
      if(editorDraft.id){
        const tpl = state.templates.find(x=>x.id===editorDraft.id);
        if(tpl){ tpl.name = name; tpl.ex = editorDraft.ex.slice(); }
      } else {
        state.templates.push({ id:uid(), name, ex:editorDraft.ex.slice() });
      }
      save(); closeSheet(); renderWorkout();
      showToast('テンプレートを保存しました');
      break;
    }
    case 'tpl-delete': {
      state.templates = state.templates.filter(x=>x.id!==editorDraft.id);
      save(); closeSheet(); renderWorkout();
      showToast('削除しました');
      break;
    }

    /* ---- exercise picker ---- */
    case 'pick-ex': pickExercise(t.dataset.id); break;
    case 'ex-create': {
      const name = ($('#newExName').value||'').trim();
      const m = $('#newExMuscle').value;
      if(!name){ showToast('種目名を入力してください'); break; }
      const dup = state.exercises.find(x=>x.name===name);
      if(dup){ pickExercise(dup.id); break; }
      const id = 'c'+uid();
      state.exercises.push({ id, name, m });
      save();
      pickExercise(id);
      break;
    }
    case 'add-exercise': openExPicker('workout'); break;

    /* ---- active session ---- */
    case 'w-minus': stepSet(ei, si, 'w', -2.5); break;
    case 'w-plus':  stepSet(ei, si, 'w',  2.5); break;
    case 'r-minus': stepSet(ei, si, 'r', -1); break;
    case 'r-plus':  stepSet(ei, si, 'r',  1); break;
    case 'set-done': doneSet(ei, si); break;
    case 'rpe-cycle': cycleRPE(ei, si, t); break;
    case 'copy-prev': copyPrevAll(ei); break;
    case 'copy-prev-set': copyPrevSet(ei, si); break;
    case 'set-add': {
      const sets = state.active.entries[ei].sets;
      const last = sets[sets.length-1];
      sets.push({ w:last?last.w:null, r:last?last.r:null, rpe:null, done:false });
      save(); renderWorkout();
      break;
    }
    case 'set-remove': {
      const sets = state.active.entries[ei].sets;
      if(sets.length > 1){ sets.pop(); save(); renderWorkout(); }
      break;
    }
    case 'entry-del': {
      state.active.entries.splice(ei, 1);
      save(); renderWorkout();
      break;
    }
    case 'entry-memo': openMemoSheet(ei); break;
    case 'memo-save': {
      state.active.entries[ei].memo = $('#memoText').value.trim();
      save(); closeSheet(); renderWorkout();
      break;
    }
    case 'plate': {
      let w = null;
      const en = state.active.entries[ei];
      for(let i=en.sets.length-1;i>=0;i--){ if(en.sets[i].w){ w = en.sets[i].w; break; } }
      if(w == null){ const prev = prevEntry(en.ex); if(prev) w = Math.max(...prev.sets.map(s=>s.w)); }
      openPlateSheet(w);
      break;
    }
    case 'finish-workout': finishWorkout(); break;
    case 'workout-cancel': {
      state.active = null;
      save(); restStop(); renderWorkout();
      showToast('ワークアウトを破棄しました');
      break;
    }

    /* ---- rest timer ---- */
    case 'rest-add30': {
      restEnd = Math.max(Date.now(), restEnd) + 30000;
      restTotal += 30;
      clearTimeout(restHideTimer);
      clearInterval(restTick);
      restTick = setInterval(restUpdate, 250);
      restUpdate();
      break;
    }
    case 'rest-skip': restStop(); break;

    /* ---- body ---- */
    case 'body-chart': {
      anaMode = 'chart'; anaSrc = 'body'; anaBodyKey = t.dataset.k;
      switchTab('analysis');
      break;
    }
    case 'body-add': openBodySheet(); break;
    case 'body-save': saveBody(); break;
    case 'mes-add': openMesSheet(); break;
    case 'mes-save': saveMes(); break;
    case 'pose': {
      photoPose = t.dataset.pose;
      $$('#poseSeg button').forEach(b=> b.classList.toggle('active', b.dataset.pose===photoPose));
      loadPhotos();
      break;
    }
    case 'photo-add': {
      const inp = $('#photoInput');
      inp.value = '';
      inp.click();
      break;
    }
    case 'photo-del': {
      idbDel(t.dataset.id).then(()=>{ showToast('写真を削除しました'); loadPhotos(); });
      break;
    }
    case 'photo-compare': openCompareSheet(); break;

    /* ---- analysis ---- */
    case 'ana-mode': anaMode = t.dataset.m; renderAnalysis(); break;
    case 'ana-src': anaSrc = t.dataset.s; renderAnaBody(); break;
    case 'ana-period': anaPeriod = +t.dataset.p; renderAnaBody(); break;
    case 'cal-prev': case 'cal-next': {
      const p = calCursor.split('-');
      let y = +p[0], m = +p[1] + (act==='cal-next' ? 1 : -1);
      if(m < 1){ m = 12; y--; }
      if(m > 12){ m = 1; y++; }
      calCursor = y + '-' + pad2(m);
      renderAnaBody();
      break;
    }
    case 'cal-day': openDaySheet(t.dataset.d); break;
    case 'del-workout': {
      state.workouts = state.workouts.filter(w=>w.id!==t.dataset.id);
      save(); closeSheet(); renderAnaBody();
      showToast('削除しました');
      break;
    }

    /* ---- settings ---- */
    case 'export-json': exportJSON(); break;
    case 'export-csv': exportCSV(); break;
    case 'import-json': {
      const inp = $('#importInput');
      inp.value = '';
      inp.click();
      break;
    }
    case 'wipe-data': {
      localStorage.removeItem(LS_KEY);
      try{
        if(idb){ idb.close(); idb = null; }
        indexedDB.deleteDatabase('lift_photos');
      }catch(err){}
      state = defaultState();
      save();
      restStop();
      switchTab('home');
      showToast('全データを削除しました');
      break;
    }
  }
}

function onInput(e){
  const t = e.target;
  if(t.dataset && t.dataset.in){
    const s = getSet(+t.dataset.ei, +t.dataset.si);
    if(!s) return;
    if(t.dataset.in === 'w'){
      const v = parseFloat(t.value);
      s.w = isNaN(v) ? null : v;
    } else {
      const v = parseInt(t.value, 10);
      s.r = isNaN(v) ? null : v;
    }
    save(); updateLive();
    return;
  }
  if(t.id === 'exSearch'){
    const list = $('#exPickList');
    if(list) list.innerHTML = exPickListHTML(t.value);
    return;
  }
  if(t.id === 'tplName'){
    if(editorDraft) editorDraft.name = t.value;
    return;
  }
  if(t.id === 'plW'){ renderPlates(); return; }
  if(t.id === 'cmpRange'){ applyCmpPos(t.value); return; }
  if(t.dataset && t.dataset.set){
    const key = t.dataset.set;
    const v = parseFloat(t.value);
    state.settings[key] = isNaN(v) ? null : v;
    if(key==='weeklyGoal' && state.settings[key] != null) state.settings[key] = Math.max(1, Math.round(state.settings[key]));
    if(key==='restSec' && state.settings[key] != null) state.settings[key] = Math.max(5, Math.round(state.settings[key]));
    save();
    return;
  }
}

function onChange(e){
  const t = e.target;
  if(t.id === 'plBar'){ renderPlates(); return; }
  if(t.id === 'anaBodySel'){ anaBodyKey = t.value; drawAnaChart(); return; }
  if(t.id === 'anaExSel'){ anaExId = t.value; drawAnaChart(); return; }
  if(t.id === 'anaExMetricSel'){ anaExMetric = t.value; drawAnaChart(); return; }
  if(t.id === 'cmpA' || t.id === 'cmpB'){ updateCompare(); return; }
  if(t.id === 'photoInput'){
    if(t.files && t.files[0]) addPhoto(t.files[0]);
    return;
  }
  if(t.id === 'importInput'){
    if(t.files && t.files[0]) importJSON(t.files[0]);
    return;
  }
}

/* chart scrub (touch + mouse) */
function scrubHandler(e){
  const cv = e.target;
  if(!cv || cv.id !== 'anaCanvas') return;
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  chartScrub(cv, x);
}

/* body の高さを実際に見えている領域へ同期（100dvh が視覚ビューポートとずれる環境向けの保険） */
(function(){
  const vv = window.visualViewport;
  if(!vv) return;
  let raf = 0;
  function fit(){
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(()=>{
      if(vv.scale && Math.abs(vv.scale - 1) > 0.01) return; // ピンチズーム中は触らない
      const ae = document.activeElement;
      if(ae && (ae.tagName==='INPUT' || ae.tagName==='TEXTAREA' || ae.tagName==='SELECT')) return; // キーボード表示中は触らない
      const h = Math.round(vv.height);
      if(h > 0 && Math.abs(document.body.getBoundingClientRect().height - h) > 1){
        document.body.style.height = h + 'px';
      }
    });
  }
  vv.addEventListener('resize', fit);
  vv.addEventListener('scroll', fit);
  window.addEventListener('orientationchange', fit);
  document.addEventListener('focusout', fit);
  fit();
})();

/* ---------------- init ---------------- */
load();
if('serviceWorker' in navigator && (location.hostname.endsWith('.github.io') || location.hostname === 'localhost')){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
document.addEventListener('click', onClick);
document.addEventListener('input', onInput);
document.addEventListener('change', onChange);
document.addEventListener('touchstart', scrubHandler, { passive:true });
document.addEventListener('touchmove', scrubHandler, { passive:true });
document.addEventListener('mousemove', scrubHandler);
window.addEventListener('resize', ()=>{ if(curTab==='analysis' && anaMode==='chart') drawAnaChart(); });
switchTab('home');
if(state.active) showToast('進行中のワークアウトがあります');
</script>
